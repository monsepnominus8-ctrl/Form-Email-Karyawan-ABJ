<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Email Karyawan PT. ALAM BUMI JASINDO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen py-10">
  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
    
    <!-- Judul -->
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Data Email Karyawan</h1>
      <h2 class="text-lg font-semibold text-blue-700">PT. ALAM BUMI JASINDO</h2>
    </div>

    <!-- Note Peringatan -->
    <div class="bg-yellow-50 border border-yellow-200 text-yellow-800 px-4 py-3 rounded-xl mb-6 text-sm">
      <strong>⚠️ Perhatian:</strong> Harap Pastikan <strong>ID Karyawan</strong> & <strong>Email</strong> diisi dengan benar.
    </div>

    <form id="karyawanForm" class="space-y-5">
      
      <!-- Nama Lengkap -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nama Lengkap <span class="text-red-500">*</span></label>
        <input type="text" id="nama" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- ID Karyawan -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">ID Karyawan <span class="text-red-500">*</span></label>
        <input type="text" id="id_karyawan" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Nomor HP -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nomor HP <span class="text-red-500">*</span></label>
        <input type="tel" id="no_hp" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email <span class="text-red-500">*</span></label>
        <input type="email" id="email" required 
               class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <!-- Tombol Submit -->
      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3.5 rounded-xl transition duration-200 text-lg shadow-md mt-2">
        Kirim Data
      </button>
    </form>

    <!-- Hasil Submit -->
    <div id="result" class="mt-5 text-center hidden"></div>

  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzOL1pReRB_xjjhNVokcK8yJTIzXyFSGwwy5m1LFwym85cNTh7-d3CR0vxjVUa6_Ho8/exec"; // GANTI DENGAN URL DEPLOY TERBARU

    document.getElementById("karyawanForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const resultDiv = document.getElementById("result");
      resultDiv.classList.remove("hidden");
      resultDiv.innerHTML = `<p class="text-blue-600 font-medium">⏳ Mengirim data...</p>`;

      // Kirim data sebagai Form Data (lebih stabil)
      const formData = new URLSearchParams();
      formData.append("nama", document.getElementById("nama").value.trim());
      formData.append("id_karyawan", document.getElementById("id_karyawan").value.trim());
      formData.append("no_hp", document.getElementById("no_hp").value.trim());
      formData.append("email", document.getElementById("email").value.trim());

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          body: formData,
          headers: {
            "Content-Type": "application/x-www-form-urlencoded"
          }
        });

        const result = await response.json();

        if (result.status === "success") {
          resultDiv.innerHTML = `<p class="text-green-600 font-semibold text-lg">✅ Data berhasil disimpan!</p>`;
          document.getElementById("karyawanForm").reset();
          
          setTimeout(() => {
            resultDiv.classList.add("hidden");
          }, 4000);
        } else {
          resultDiv.innerHTML = `<p class="text-red-600">❌ Gagal: ${result.message}</p>`;
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="text-red-600">❌ Terjadi kesalahan. Silakan coba lagi.</p>`;
      }
    });
  </script>
</body>
</html>
